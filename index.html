<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRX Modern Trend - Final Integrated</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #0f172a; display: flex; justify-content: center; padding: 10px; color: #f8fafc; overflow-x: hidden; }
        .container { background: #1e293b; padding: 20px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); position: relative; width: 100%; max-width: 1000px; border: 1px solid #334155; }
        .header { text-align: center; color: #f1c40f; margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 15px; font-size: 20px; font-weight: bold; letter-spacing: 1px; }
        
        .row-grid { display: flex; align-items: center; height: 45px; border-bottom: 1px solid #334155; position: relative; z-index: 5; }
        .row-label { width: 90px; font-size: 16px; color: #94a3b8; font-weight: 400; }
        
        .cells { display: flex; flex: 0 0 auto; width: 350px; justify-content: center; gap: 4px; padding: 0 10px; align-items: center; border-left: 1px solid #334155; }
        .cell { width: 28px; height: 28px; line-height: 28px; text-align: center; font-weight: bold; color: #475569; font-size: 16px; border-radius: 50%; transition: 0.3s; }
        
        /* Digit Group Colors */
        .active-green { background-color: #22c55e !important; color: white !important; box-shadow: 0 0 10px rgba(34, 197, 94, 0.5); }
        .active-red { background-color: #ef4444 !important; color: white !important; box-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
        .active-purple { background-color: #a855f7 !important; color: white !important; box-shadow: 0 0 10px rgba(168, 85, 247, 0.5); }

        /* Side Info Container - ?????????????????? ?????? */
.side-info { 
    display: flex; 
    align-items: center; 
    width: 420px;           /* ???????????????? ??????????????? */
    padding-left: 15px; 
    border-left: 1px solid #334155; 
}

/* B/S Type */
.text-s, .text-b { width: 30px; font-weight: 900; font-size: 18px; text-align: center; margin-right: 10px; }
.text-s { color: #3498db; }
.text-b { color: #e67e22; }

/* Trend Status (Extra Data) */
.extra-text { width: 120px; font-size: 14px; color: #cbd5e1; font-style: italic; white-space: nowrap; overflow: hidden; }

/* Prediction (P) */
.pred-text { width: 40px; color: #f1c40f; font-weight: bold; font-size: 18px; text-align: center; }

/* Result (Win/Loss) */
.win-text, .loss-text { width: 60px; font-weight: bold; font-size: 15px; text-align: center; }
.win-text { color: #22c55e; }
.loss-text { color: #ef4444; }

/* Strend (????????????????????? ??????????? pattern) */
.strend-text { 
    width: 150px; 
    color: #94a3b8; 
    font-family: 'Courier New', Courier, monospace; 
    font-size: 13px; 
    white-space: nowrap; overflow: hidden; /* ?????????????????? ????????? */
    margin-left: 10px;
}
        
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1; }
        .footer-info { display: flex; justify-content: space-between; font-size: 11px; color: #64748b; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container" id="chartBox">
    <div class="header">TRX MODERN TREND (LIVE)</div>
    <canvas id="lineCanvas"></canvas>
    <div id="chartData">Loading data via Proxy...</div>
    <div class="footer-info">
        <div id="connection-status">? Initializing...</div>
        <div id="last-update">Last Update: --:--:--</div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxFu8umzrtkcV-KRXWGGc_8v8xQMU9XBkl2HbPevwnp7ilUBPud2pIkpjpWQNQi8HOM/exec"; 
    const REFRESH_INTERVAL = 12000;

    async function loadTrendData() {
        const conn = document.getElementById('connection-status');
        const proxy = "https://api.allorigins.win/get?url=";
        
        // Cache မငြိစေရန် Timestamp (?t=...) ထည့်ထားသည်
        const finalUrl = proxy + encodeURIComponent(API_URL + "?t=" + Date.now());

        try {
            const res = await fetch(finalUrl);
            if (!res.ok) throw new Error('Network response was not ok');
            
            const responseData = await res.json();
            
            // allorigins က data ကို contents ဆိုတဲ့ string ထဲမှာ ထည့်ပေးသဖြင့် parse လုပ်ရသည်
            const data = JSON.parse(responseData.contents);

            if (data && data.length > 0) {
                // Newest First (အသစ်ဆုံးကို ထိပ်ကပြရန်)
                renderModernChart(data.reverse().slice(0, 35)); 
                
                document.getElementById('last-update').innerText = "Last Update: " + new Date().toLocaleTimeString();
                conn.innerText = "● Live Connected (AllOrigins)";
                conn.style.color = "#22c55e";
            }
        } catch (e) {
            console.error("Fetch error:", e);
            conn.innerText = "○ Connection Lost - Retrying...";
            conn.style.color = "#ef4444";
        }
    }
    function getActiveClass(digit) {
        const d = parseInt(digit);
        if ([1, 3, 7, 9].includes(d)) return "active-green";
        if ([2, 4, 6, 8].includes(d)) return "active-red";
        if ([0, 5].includes(d)) return "active-purple";
        return "";
    }

    function renderModernChart(displayData) {
        const output = document.getElementById('chartData');
        
        // Data အဟောင်းတွေကို မဖျက်ဘဲ အသစ်တွေကိုပဲ စစ်ပြီး ထည့်မည်
        // မှတ်ချက် - displayData က အသစ်ဆုံးကို အရင်ယူထားရင် slice(0, 10) စသဖြင့် ဖြတ်ယူနိုင်သည်
        output.innerHTML = ""; 

        displayData.forEach((item, rIdx) => {
            const currentDigit = parseInt(item.digit);
            const type = (item.type || "").toUpperCase();
            const activeClass = getActiveClass(currentDigit);
            const resClass = item.result === "WIN" ? "win-text" : (item.result === "LOSS" ? "loss-text" : "");

            let digitsHtml = "";
            for (let i = 0; i <= 9; i++) {
                const highlight = (i === currentDigit) ? activeClass : "";
                digitsHtml += `<div class="cell ${highlight}" id="dot-${rIdx}-${i}">${i}</div>`;
            }

            // တစ်ကြောင်းချင်းစီကို ကတ်ပြား (Card) ပုံစံဖြင့် ညာဘက်သို့ စီသွားမည်
            output.innerHTML += `
                <div class="row-grid">
                    <div class="row-label" style="width:100%; border-bottom:1px solid #334155; padding-bottom:5px; margin-bottom:5px;">
                        ${item.label}
                    </div>
                    <div class="cells" style="width:100%; border:none;">${digitsHtml}</div>
                    <div class="side-info">
                        <div style="display:flex; justify-content: space-between; width:100%;">
                             <div class="${type === 'B' ? 'text-b' : 'text-s'}">${type}</div>
                             <div class="pred-text">${item.prediction || ""}</div>
                             <div class="${resClass}">${item.result || "----"}</div>
                        </div>
                        <div class="extra-text" style="width:100%; margin-top:5px;">${item.extraData || ""}</div>
                        <div class="strend-text" style="width:100%; text-align:left; margin-top:5px;">${item.strend || ""}</div>
                    </div>
                </div>`;
        });

        // အသစ်တိုးလာတိုင်း Scroll ကို ညာဘက်အဆုံးသို့ ပို့ပေးခြင်း
        output.scrollLeft = output.scrollWidth;
    }

        // Drawing Line Logic
        setTimeout(() => {
            canvas.width = container.offsetWidth;
            canvas.height = container.offsetHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "rgba(241, 196, 15, 0.4)"; 
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 3]);
            ctx.beginPath();

            let hasPoint = false;
            displayData.forEach((item, i) => {
                const digit = parseInt(item.digit);
                const el = document.getElementById(`dot-${i}-${digit}`);
                if (el) {
                    const rect = el.getBoundingClientRect();
                    const cRect = container.getBoundingClientRect();
                    const x = rect.left - cRect.left + (rect.width / 2);
                    const y = rect.top - cRect.top + (rect.height / 2);
                    if (!hasPoint) { ctx.moveTo(x, y); hasPoint = true; }
                    else ctx.lineTo(x, y);
                }
            });
            ctx.stroke();
        }, 250);
    }

    loadTrendData();
    setInterval(loadTrendData, REFRESH_INTERVAL);
</script>

</body>
</html>
