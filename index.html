<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRX Live - Direct Fast (Modern UI)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #0f172a; display: flex; justify-content: center; padding: 10px; color: #f8fafc; overflow-x: hidden; }
        .container { background: #1e293b; padding: 20px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); position: relative; width: 100%; max-width: 1150px; border: 1px solid #334155; }
        .header { text-align: center; color: #f1c40f; margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 15px; font-size: 20px; font-weight: bold; letter-spacing: 1px; }
        
        .row-grid { display: flex; align-items: center; height: 45px; border-bottom: 1px solid #334155; position: relative; z-index: 5; }
        .row-label { width: 150px; font-size: 16px; color: #94a3b8; }
        
        .cells { display: flex; flex: 0 0 auto; width: 320px; justify-content: center; gap: 4px; padding: 0 10px; align-items: center; border-left: 1px solid #334155; }
        .cell { width: 26px; height: 26px; line-height: 26px; text-align: center; font-weight: bold; color: #475569; font-size: 18px; border-radius: 50%; }
        
        .active-green { background-color: #22c55e !important; color: white !important; box-shadow: 0 0 10px rgba(34, 197, 94, 0.5); }
        .active-red { background-color: #ef4444 !important; color: white !important; box-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
        .active-purple { background-color: #a855f7 !important; color: white !important; box-shadow: 0 0 10px rgba(168, 85, 247, 0.5); }

        /* --- Side Info Layout & Spacing --- */
        .side-info { 
            display: flex; 
            align-items: center; 
            width: 650px; 
            padding-left: 15px; 
            border-left: 1px solid #334155; 
            gap: 15px; /* တစ်ခုချင်းစီကြား နေရာလွတ်ချန်ခြင်း */
        }
        
        .text-s, .text-b { width: 35px; font-weight: 500; font-size: 18px; text-align: center; flex-shrink: 0; }
        .text-s { color: #3498db; }
        .text-b { color: #e67e22; }

        .extra-text { width: 110px; font-size: 14px; color: #cbd5e1; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .pred-text { 
            width: 45px; 
            color: #f1c40f; 
            font-weight: bold; 
            font-size: 18px; 
            text-align: center; 
            background: rgba(241, 196, 15, 0.1); 
            border-radius: 4px; 
            padding: 2px 0;
        }

        /* --- Win/Loss Blink Effects --- */
        .win-text, .loss-text { 
            width: 70px; 
            font-weight: bold; 
            font-size: 16px; 
            text-align: center; 
            padding: 4px 0; 
            border-radius: 5px; 
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .win-text { 
            color: #22c55e; 
            background: rgba(34, 197, 94, 0.15); 
            animation: win-blink 1.5s infinite; 
        }
        .loss-text { 
            color: #ef4444; 
            background: rgba(239, 68, 68, 0.15); 
            animation: loss-blink 1.5s infinite; 
        }

        @keyframes win-blink {
            0% { background: rgba(34, 197, 94, 0.15); box-shadow: 0 0 0px rgba(34, 197, 94, 0); }
            50% { background: rgba(34, 197, 94, 0.4); box-shadow: 0 0 10px rgba(34, 197, 94, 0.5); }
            100% { background: rgba(34, 197, 94, 0.15); box-shadow: 0 0 0px rgba(34, 197, 94, 0); }
        }

        @keyframes loss-blink {
            0% { background: rgba(239, 68, 68, 0.15); box-shadow: 0 0 0px rgba(239, 68, 68, 0); }
            50% { background: rgba(239, 68, 68, 0.4); box-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
            100% { background: rgba(239, 68, 68, 0.15); box-shadow: 0 0 0px rgba(239, 68, 68, 0); }
        }

        .strend-text { 
            width: 180px; 
            flex-grow: 1; 
            color: white; 
            font-family: monospace; 
            font-size: 14px; 
            text-align: left; 
            padding-right: 5px;
        }

        canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1; }
        .footer-info { display: flex; justify-content: space-between; font-size: 11px; color: #64748b; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container" id="chartBox">
    <div class="header">TRX MODERN TREND (DIRECT LIVE)</div>
    <canvas id="lineCanvas"></canvas>
    <div id="chartData" style="text-align: center; padding: 20px;">⌛ Connecting Directly to Google...</div>
    <div class="footer-info">
        <div id="connection-status">● Status: Initializing...</div>
        <div id="last-update">Last Update: --:--:--</div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxFu8umzrtkcV-KRXWGGc_8v8xQMU9XBkl2HbPevwnp7ilUBPud2pIkpjpWQNQi8HOM/exec"; 
    const REFRESH_INTERVAL = 5000;

    async function loadTrendData() {
        const conn = document.getElementById('connection-status');
        try {
            const res = await fetch(API_URL + "?t=" + Date.now(), { method: "GET", redirect: "follow" });
            if (!res.ok) throw new Error("Fail");
            const rawData = await res.json();

            if (rawData && rawData.length > 0) {
                renderModernChart(rawData.reverse().slice(0, 35)); 
                document.getElementById('last-update').innerText = "Last Update: " + new Date().toLocaleTimeString();
                conn.innerText = "● Direct Connected (Fast)";
                conn.style.color = "#22c55e";
            }
        } catch (e) {
            conn.innerText = "○ Connection Error (Check VPN)";
            conn.style.color = "#ef4444";
        }
    }

    function getActiveClass(digit) {
        const d = parseInt(digit);
        if ([1, 3, 7, 9].includes(d)) return "active-green";
        if ([2, 4, 6, 8].includes(d)) return "active-red";
        if ([0, 5].includes(d)) return "active-purple";
        return "";
    }

    function renderModernChart(displayData) {
        const output = document.getElementById('chartData');
        const container = document.getElementById('chartBox');
        const canvas = document.getElementById('lineCanvas');
        const ctx = canvas.getContext('2d');
        
        output.innerHTML = ""; 

        displayData.forEach((item, rIdx) => {
            const currentDigit = parseInt(item.digit);
            const type = (item.type || "").toUpperCase();
            const activeClass = getActiveClass(currentDigit);
            const resClass = item.result === "WIN" ? "win-text" : (item.result === "LOSS" ? "loss-text" : "");

            let digitsHtml = "";
            for (let i = 0; i <= 9; i++) {
                const highlight = (i === currentDigit) ? activeClass : "";
                digitsHtml += `<div class="cell ${highlight}" id="dot-${rIdx}-${i}">${i}</div>`;
            }

            output.innerHTML += `
                <div class="row-grid">
                    <div class="row-label">#${item.label}</div>
                    <div class="cells">${digitsHtml}</div>
                    <div class="side-info">
                        <div class="${type === 'B' ? 'text-b' : 'text-s'}">${type}</div>
                        <div class="extra-text" title="${item.extraData || ''}">${item.extraData || ""}</div>
                        <div class="pred-text">${item.prediction || ""}</div>
                        <div class="${resClass}">${item.result ||  "----"}</div>
                        <div class="strend-text">${item.strend || ""}</div>
                    </div>
                </div>`;
        });

        setTimeout(() => {
            canvas.width = container.offsetWidth;
            canvas.height = container.offsetHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "rgba(241, 196, 15, 0.3)"; 
            ctx.lineWidth = 2;
            ctx.setLineDash([4, 2]);
            ctx.beginPath();

            let hasPoint = false;
            displayData.forEach((item, i) => {
                const digit = parseInt(item.digit);
                const el = document.getElementById(`dot-${i}-${digit}`);
                if (el) {
                    const rect = el.getBoundingClientRect();
                    const cRect = container.getBoundingClientRect();
                    const x = rect.left - cRect.left + (rect.width / 2);
                    const y = rect.top - cRect.top + (rect.height / 2);
                    if (!hasPoint) { ctx.moveTo(x, y); hasPoint = true; }
                    else ctx.lineTo(x, y);
                }
            });
            ctx.stroke();
        }, 300);
    }

    loadTrendData();
    setInterval(loadTrendData, REFRESH_INTERVAL);
</script>

</body>
</html>
