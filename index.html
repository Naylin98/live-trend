<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRX Live Dashboard - Final Version</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background-color: #0f172a; 
            color: #f8fafc; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }

        .container { 
            background: #1e293b; 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            width: 100%; 
            max-width: 1200px; 
            border: 1px solid #334155; 
        }

        .header { 
            text-align: center; 
            color: #f1c40f; 
            margin-bottom: 20px; 
            font-size: 22px; 
            font-weight: bold; 
            letter-spacing: 1px;
            border-bottom: 1px solid #334155;
            padding-bottom: 15px;
        }

        /* ဘေးတိုက် Scroll ဆွဲမည့် Container */
        #chartData {
            display: flex;
            flex-direction: row;
            overflow-x: auto;
            gap: 15px;
            padding: 10px 5px 20px 5px;
            scroll-behavior: smooth;
        }

        /* တစ်ကြောင်းချင်းစီကို ကတ်ပြား (Card) ပုံစံဖြင့် ပြခြင်း */
        .row-grid {
            display: flex;
            flex-direction: column;
            min-width: 280px; /* ဖုန်းနဲ့ကြည့်ရင် အဆင်ပြေမည့် အကျယ် */
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 15px;
            padding: 15px;
            flex-shrink: 0;
            transition: 0.3s;
        }

        .row-grid:hover { border-color: #f1c40f; }

        .row-label { 
            font-size: 14px; 
            color: #94a3b8; 
            margin-bottom: 10px; 
            text-align: center;
            border-bottom: 1px solid #334155;
            padding-bottom: 5px;
        }

        .cells { 
            display: flex; 
            justify-content: center; 
            gap: 5px; 
            margin-bottom: 15px;
        }

        .cell { 
            width: 24px; height: 24px; 
            line-height: 24px; 
            text-align: center; 
            font-weight: bold; 
            color: #475569; 
            font-size: 14px; 
            border-radius: 50%; 
            border: 1px solid #334155;
        }

        .active-green { background-color: #22c55e !important; color: white !important; box-shadow: 0 0 10px rgba(34, 197, 94, 0.5); }
        .active-red { background-color: #ef4444 !important; color: white !important; box-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
        .active-purple { background-color: #a855f7 !important; color: white !important; box-shadow: 0 0 10px rgba(168, 85, 247, 0.5); }

        .side-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .info-top { display: flex; justify-content: space-between; align-items: center; }

        .text-s { color: #3498db; font-weight: 900; font-size: 18px; }
        .text-b { color: #e67e22; font-weight: 900; font-size: 18px; }
        .pred-text { color: #f1c40f; font-weight: bold; font-size: 20px; }
        .win-text { color: #22c55e; font-weight: bold; }
        .loss-text { color: #ef4444; font-weight: bold; }

        .extra-text { font-size: 13px; color: #cbd5e1; font-style: italic; }
        .strend-text { 
            font-family: 'Courier New', monospace; 
            font-size: 13px; 
            color: #94a3b8; 
            word-break: break-all;
            background: #1e293b;
            padding: 5px;
            border-radius: 5px;
        }

        .footer-info { display: flex; justify-content: space-between; font-size: 12px; color: #64748b; margin-top: 15px; width: 100%; max-width: 1200px; }
        
        /* Custom Scrollbar */
        #chartData::-webkit-scrollbar { height: 8px; }
        #chartData::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">TRX LIVE TREND DASHBOARD</div>
    <div id="chartData">Loading data via Proxy...</div>
</div>

<div class="footer-info">
    <div id="connection-status">? Initializing...</div>
    <div id="last-update">Last Update: --:--:--</div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxFu8umzrtkcV-KRXWGGc_8v8xQMU9XBkl2HbPevwnp7ilUBPud2pIkpjpWQNQi8HOM/exec"; 
    const REFRESH_INTERVAL = 12000; // Proxy အတွက် ၁၂ စက္ကန့် ထားပေးပါ

    async function loadTrendData() {
        const conn = document.getElementById('connection-status');
        // corsproxy.io ကိုသုံးထားသဖြင့် VPN မပါဘဲ ပိုတည်ငြိမ်ပါမည်
        const proxy = "https://corsproxy.io/?"; 
        const finalUrl = proxy + encodeURIComponent(API_URL + "?t=" + Date.now());

        try {
            const res = await fetch(finalUrl);
            const data = await res.json();

            if (data && data.length > 0) {
                // အဟောင်းများကို ဘယ်ဘက်၊ အသစ်များကို ညာဘက်တွင်ပြရန် data.reverse() မလုပ်တော့ပါ
                renderModernChart(data.slice(-20)); // နောက်ဆုံးအပတ် ၂၀ ကိုပဲ ပြမည်
                document.getElementById('last-update').innerText = "Last Update: " + new Date().toLocaleTimeString();
                conn.innerText = "● Live Connected (No-VPN)";
                conn.style.color = "#22c55e";
            }
        } catch (e) {
            conn.innerText = "○ Reconnecting...";
            conn.style.color = "#f1c40f";
        }
    }

    function getActiveClass(digit) {
        const d = parseInt(digit);
        if ([1, 3, 7, 9].includes(d)) return "active-green";
        if ([2, 4, 6, 8].includes(d)) return "active-red";
        if ([0, 5].includes(d)) return "active-purple";
        return "";
    }

    function renderModernChart(displayData) {
        const output = document.getElementById('chartData');
        output.innerHTML = ""; 

        displayData.forEach((item, rIdx) => {
            const currentDigit = parseInt(item.digit);
            const type = (item.type || "").toUpperCase();
            const activeClass = getActiveClass(currentDigit);
            const resClass = item.result === "WIN" ? "win-text" : (item.result === "LOSS" ? "loss-text" : "");

            let digitsHtml = "";
            for (let i = 0; i <= 9; i++) {
                const highlight = (i === currentDigit) ? activeClass : "";
                digitsHtml += `<div class="cell ${highlight}">${i}</div>`;
            }

            output.innerHTML += `
                <div class="row-grid">
                    <div class="row-label">Block: ${item.label}</div>
                    <div class="cells">${digitsHtml}</div>
                    <div class="side-info">
                        <div class="info-top">
                            <div class="${type === 'B' ? 'text-b' : 'text-s'}">${type} (${currentDigit})</div>
                            <div class="pred-text">${item.prediction || ""}</div>
                            <div class="${resClass}">${item.result || "WAIT"}</div>
                        </div>
                        <div class="extra-text">${item.extraData || "Analyzing..."}</div>
                        <div class="strend-text">${item.strend || "No Pattern"}</div>
                    </div>
                </div>`;
        });

        // အသစ်ဆုံး data ရှိရာ ညာဘက်အဆုံးသို့ Auto Scroll လုပ်ခြင်း
        setTimeout(() => {
            output.scrollLeft = output.scrollWidth;
        }, 500);
    }

    loadTrendData();
    setInterval(loadTrendData, REFRESH_INTERVAL);
</script>

</body>
</html>
