<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRX Live - Grid View</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent: #f1c40f;
            --text-main: #f8fafc;
            --border: #334155;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            margin: 0; padding: 10px;
        }

        /* ဘေးတိုက် Scroll ဆွဲမည့် Container */
        #chartContainer {
            display: flex;
            flex-direction: row; /* Column များကို ဘေးတိုက်စီမည် */
            overflow-x: auto;
            gap: 20px;
            padding: 10px;
            scroll-behavior: smooth;
            height: 90vh; /* Screen အပြည့်နီးပါးယူမည် */
        }

        /* Column တစ်ခုချင်းစီ (၁၀ ကြောင်းစာ စုစည်းမှု) */
        .data-column {
            display: flex;
            flex-direction: column-reverse; /* အောက်ကနေ အပေါ်သို့ စီမည် */
            gap: 10px;
            min-width: 300px;
            flex-shrink: 0;
        }

        /* တစ်ကြောင်းချင်းစီ၏ Card ပုံစံ */
        .row-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            transition: 0.3s;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .row-label { font-size: 11px; color: #94a3b8; border-bottom: 1px solid #475569; margin-bottom: 8px; }

        .cells { display: flex; gap: 4px; margin-bottom: 8px; justify-content: center; }

        .cell { width: 20px; height: 20px; line-height: 20px; text-align: center; font-weight: bold; font-size: 11px; border-radius: 50%; color: #475569; border: 1px solid #334155; }

        .active-green { background: #22c55e !important; color: white !important; }
        .active-red { background: #ef4444 !important; color: white !important; }
        .active-purple { background: #a855f7 !important; color: white !important; }

        .info { display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .type-b { color: #e67e22; font-weight: bold; }
        .type-s { color: #3498db; font-weight: bold; }
        .pred { color: var(--accent); font-weight: bold; }
        .win { color: #22c55e; } .loss { color: #ef4444; }

        #chartContainer::-webkit-scrollbar { height: 8px; }
        #chartContainer::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body>

<div id="chartContainer">
    <div style="padding: 20px;">⌛ Connecting to TRX...</div>
</div>

<script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxFu8umzrtkcV-KRXWGGc_8v8xQMU9XBkl2HbPevwnp7ilUBPud2pIkpjpWQNQi8HOM/exec";
    const REFRESH_RATE = 7000;

    async function fetchTrend() {
        try {
            const response = await fetch(GOOGLE_SCRIPT_URL, { redirect: "follow" });
            const data = await response.json();
            if (data && data.length > 0) renderGrid(data);
        } catch (err) { console.error(err); }
    }

    function getDigitClass(d) {
        d = parseInt(d);
        if ([1,3,7,9].includes(d)) return "active-green";
        if ([2,4,6,8].includes(d)) return "active-red";
        if ([0,5].includes(d)) return "active-purple";
        return "";
    }

    function renderGrid(items) {
        const container = document.getElementById('chartContainer');
        container.innerHTML = "";

        // ဒေတာများကို ၁၀ ခုစီ အုပ်စုခွဲခြင်း (Chunks)
        const chunkSize = 10;
        for (let i = 0; i < items.length; i += chunkSize) {
            const chunk = items.slice(i, i + chunkSize);
            const columnDiv = document.createElement('div');
            columnDiv.className = 'data-column';

            chunk.forEach(item => {
                const d = parseInt(item.digit);
                const type = (item.type || "S").toUpperCase();
                const resClass = item.result === "WIN" ? "win" : (item.result === "LOSS" ? "loss" : "");

                let cellsHtml = "";
                for (let j = 0; j <= 9; j++) {
                    const active = (j === d) ? getDigitClass(j) : "";
                    cellsHtml += `<div class="cell ${active}">${j}</div>`;
                }

                columnDiv.innerHTML += `
                    <div class="row-card">
                        <div class="row-label">#${item.label}</div>
                        <div class="cells">${cellsHtml}</div>
                        <div class="info">
                            <span class="${type === 'B' ? 'type-b' : 'type-s'}">${type}(${d})</span>
                            <span class="pred">${item.prediction || ""}</span>
                            <span class="${resClass}">${item.result || "-"}</span>
                        </div>
                    </div>
                `;
            });
            container.appendChild(columnDiv);
        }
        
        // အသစ်ဆုံး Column ရှိရာ ညာဘက်သို့ Scroll လုပ်ပေးခြင်း
        setTimeout(() => { container.scrollLeft = container.scrollWidth; }, 300);
    }

    fetchTrend();
    setInterval(fetchTrend, REFRESH_RATE);
</script>

</body>
</html>
